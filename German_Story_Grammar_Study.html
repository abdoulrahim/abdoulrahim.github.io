// ===== RENDER =====
const nav = document.getElementById('nav');
const storiesDiv = document.getElementById('stories');
let colorsOn = true;
let allTransVisible = false;

stories.forEach((s, i) => {
  const btn = document.createElement('button');
  const lvl = s.level.toLowerCase().replace(' ','');
  btn.innerHTML = `<span class="level-tag level-${lvl}">${s.level}</span>${s.title}`;
  btn.onclick = () => showStory(i);
  if(i === 0) btn.classList.add('active');
  nav.appendChild(btn);

  let html = `<div class="story ${i===0?'active':''}" id="story-${i}">`;
  html += `<div class="story-card">`;
  html += `<div class="story-title"><span class="level-tag level-${lvl}">${s.level}</span> ${s.title}</div>`;
  html += `<div class="story-topic">Grammar Focus: ${s.topic}</div>`;

  s.sentences.forEach((sent, si) => {
    html += `<div class="sentence-block">`;
    html += `<div class="sentence-de"><span class="snum">${si+1}</span>`;
    sent.de.forEach((wd, wi) => {
      const gc = getGrammarClass(wd.g);
      html += `<span class="word gc-${gc}" onclick="togglePopup(this)" data-e="${esc(wd.e)}" data-g="${esc(wd.g)}">`;
      html += `${wd.w} <span class="popup"><span class="pw">${esc(wd.w)}</span><br><span class="pe">→ ${esc(wd.e)}</span><br><span class="pg">${esc(wd.g)}</span></span>`;
      html += `</span> `;
    });
    html += `</div>`;
    html += `<div class="toggle-row"><button class="toggle-btn" onclick="toggleTrans(this)">Show English</button></div>`;
    html += `<div class="sentence-en">${sent.en}</div>`;
    html += `</div>`;
  });

  html += `</div></div>`;
  storiesDiv.innerHTML += html;
});

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function getGrammarClass(g) {
  const gl = g.toLowerCase();
  if(gl.includes('verb') || gl.includes('auxiliar') || gl.includes('partizip') || gl.includes('infinitiv') || gl.includes('präteritum') || gl.includes('präsens')) return 'verb';
  if(gl.includes('noun') || gl.includes('proper noun')) return 'noun';
  if(gl.includes('adjective') || gl.includes('adjektiv')) return 'adj';
  if(gl.includes('preposition') || gl.includes('präposition') || gl.includes('contraction')) return 'prep';
  if(gl.includes('pronoun') || gl.includes('reflexiv') || gl.includes('possessiv')) return 'pron';
  if(gl.includes('adverb') || gl.includes('particle') || gl.includes('negation')) return 'adv';
  if(gl.includes('conjunction') || gl.includes('konjunktion')) return 'conj';
  if(gl.includes('article') || gl.includes('artikel')) return 'art';
  return 'noun';
}

function showStory(idx) {
  document.querySelectorAll('.story').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('story-'+idx).classList.add('active');
  nav.children[idx].classList.add('active');
  document.querySelectorAll('.popup').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.word').forEach(w => w.classList.remove('clicked'));
}

function togglePopup(el) {
  const pop = el.querySelector('.popup');
  const wasVisible = pop.style.display === 'block';
  document.querySelectorAll('.popup').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.word').forEach(w => w.classList.remove('clicked'));
  if(!wasVisible) { pop.style.display = 'block'; el.classList.add('clicked'); }
}

function toggleTrans(btn) {
  const en = btn.parentElement.nextElementSibling;
  const show = !en.classList.contains('show');
  en.classList.toggle('show');
  btn.textContent = show ? 'Hide English' : 'Show English';
  btn.classList.toggle('on', show);
}

function toggleAllTranslations() {
  allTransVisible = !allTransVisible;
  document.querySelectorAll('.sentence-en').forEach(en => {
    en.classList.toggle('show', allTransVisible);
  });
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.textContent = allTransVisible ? 'Hide English' : 'Show English';
    btn.classList.toggle('on', allTransVisible);
  });
}

function toggleColorMode() {
  colorsOn = !colorsOn;
  const classes = ['gc-verb','gc-noun','gc-adj','gc-prep','gc-pron','gc-adv','gc-conj','gc-art'];
  document.querySelectorAll('.word').forEach(w => {
    classes.forEach(c => {
      if(w.classList.contains(c)) { w.style.borderBottom = colorsOn ? '' : 'none'; }
    });
  });
}

document.addEventListener('click', function(e) {
  if(!e.target.closest('.word')) {
    document.querySelectorAll('.popup').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.word').forEach(w => w.classList.remove('clicked'));
  }
});
</script>
