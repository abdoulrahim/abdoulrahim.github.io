<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German A1 — Vocabulary in Sentences</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root {
    --primary: #6d28d9;
    --primary-light: #a78bfa;
    --primary-bg: #f5f3ff;
    --accent: #f59e0b;
    --accent-bg: #fef3c7;
    --success: #10b981;
    --success-bg: #d1fae5;
    --error: #ef4444;
    --error-bg: #fee2e2;
    --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;}

  /* HEADER */
  .app-header{background:linear-gradient(135deg,var(--primary),#4f46e5);color:white;padding:20px 24px;text-align:center;position:sticky;top:0;z-index:50;}
  .app-header h1{font-size:20px;font-weight:700;}
  .app-header p{font-size:13px;opacity:0.85;margin-top:2px;}

  /* STATS BAR */
  .stats-bar{display:flex;justify-content:center;gap:24px;padding:16px;background:white;border-bottom:1px solid var(--g200);flex-wrap:wrap;}
  .stat{text-align:center;}
  .stat .num{font-size:24px;font-weight:800;color:var(--primary);}
  .stat .label{font-size:11px;color:var(--g500);text-transform:uppercase;letter-spacing:0.5px;}

  /* PROGRESS */
  .progress-row{padding:12px 24px;background:white;border-bottom:1px solid var(--g200);}
  .progress-outer{height:8px;background:var(--g100);border-radius:4px;overflow:hidden;}
  .progress-inner{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width 0.5s;}
  .progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--g500);margin-bottom:4px;}

  /* FILTERS */
  .filter-bar{display:flex;gap:8px;padding:16px 24px;overflow-x:auto;background:white;border-bottom:1px solid var(--g200);}
  .filter-chip{
    padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;
    border:2px solid var(--g200);background:white;color:var(--g600);white-space:nowrap;transition:all 0.2s;
  }
  .filter-chip:hover{border-color:var(--primary-light);}
  .filter-chip.active{background:var(--primary);color:white;border-color:var(--primary);}

  /* MAIN AREA */
  .main{max-width:640px;margin:0 auto;padding:24px;}

  /* FLASHCARD */
  .flashcard-container{perspective:1000px;margin-bottom:24px;}
  .flashcard{
    position:relative;width:100%;min-height:320px;border-radius:16px;
    transition:transform 0.6s;transform-style:preserve-3d;cursor:default;
  }
  .flashcard.flipped{transform:rotateY(180deg);}
  .card-face{
    position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;
    display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px;
    box-shadow:0 4px 24px rgba(0,0,0,0.08);
  }
  .card-front{background:white;border:2px solid var(--g200);}
  .card-back{background:linear-gradient(135deg,#fefce8,#fef3c7);border:2px solid var(--accent);transform:rotateY(180deg);}

  .card-category{
    position:absolute;top:16px;left:16px;font-size:11px;font-weight:600;
    padding:4px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:0.5px;
  }
  .cat-verben{background:#dbeafe;color:#1e40af;}
  .cat-nomen{background:#fce7f3;color:#9d174d;}
  .cat-sätze{background:#d1fae5;color:#065f46;}
  .cat-artikel{background:#fef3c7;color:#92400e;}
  .cat-präpositionen{background:#e0e7ff;color:#3730a3;}
  .cat-modalverben{background:#ede9fe;color:#5b21b6;}
  .cat-adjektive{background:#fce7f3;color:#be185d;}

  .card-number{
    position:absolute;top:16px;right:16px;font-size:12px;color:var(--g400);font-weight:500;
  }

  .card-sentence{font-size:20px;line-height:1.7;text-align:center;margin-bottom:20px;color:var(--g800);}
  .card-sentence .blank{
    display:inline-block;min-width:120px;border-bottom:3px solid var(--primary);
    color:var(--primary);font-weight:700;text-align:center;padding:0 4px;
  }
  .card-hint{font-size:14px;color:var(--g400);font-style:italic;margin-bottom:16px;}

  .input-area{display:flex;gap:10px;width:100%;max-width:360px;align-items:center;}
  .input-area input{
    flex:1;padding:12px 16px;border:2px solid var(--g300);border-radius:10px;
    font-size:16px;font-family:inherit;outline:none;transition:border-color 0.2s;text-align:center;
  }
  .input-area input:focus{border-color:var(--primary);}
  .input-area input.correct{border-color:var(--success);background:var(--success-bg);color:#065f46;}
  .input-area input.incorrect{border-color:var(--error);background:var(--error-bg);color:#991b1b;}

  .check-btn{
    padding:12px 20px;background:var(--primary);color:white;border:none;border-radius:10px;
    font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;
  }
  .check-btn:hover{background:#5b21b6;}

  /* BACK side */
  .back-sentence{font-size:22px;line-height:1.7;text-align:center;margin-bottom:12px;color:var(--g900);font-weight:600;}
  .back-sentence .word-highlight{color:var(--primary);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:4px;}
  .back-translation{font-size:16px;color:var(--g500);text-align:center;font-style:italic;margin-bottom:8px;}
  .back-word-info{font-size:14px;color:var(--g600);text-align:center;background:white;padding:10px 16px;border-radius:8px;margin-top:8px;}
  .back-result{font-size:16px;font-weight:700;margin-bottom:12px;}
  .back-result.correct{color:var(--success);}
  .back-result.incorrect{color:var(--error);}

  /* NAVIGATION */
  .nav-row{display:flex;gap:12px;justify-content:center;margin-bottom:16px;}
  .nav-btn{
    padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;
    cursor:pointer;transition:all 0.2s;border:none;
  }
  .nav-btn.prev{background:var(--g100);color:var(--g700);}
  .nav-btn.prev:hover{background:var(--g200);}
  .nav-btn.next{background:var(--primary);color:white;}
  .nav-btn.next:hover{background:#5b21b6;}
  .nav-btn.flip{background:var(--accent);color:var(--g900);}
  .nav-btn.flip:hover{background:#d97706;}
  .nav-btn:disabled{opacity:0.4;cursor:default;}

  /* KEYBOARD HINT */
  .keyboard-hint{text-align:center;font-size:12px;color:var(--g400);margin-top:12px;}
  .keyboard-hint kbd{
    background:var(--g100);border:1px solid var(--g300);padding:2px 6px;border-radius:4px;font-family:inherit;font-size:11px;
  }

  /* COMPLETION */
  .completion-card{
    background:linear-gradient(135deg,var(--success),#059669);color:white;
    border-radius:16px;padding:48px 32px;text-align:center;margin:24px 0;
  }
  .completion-card h2{font-size:28px;margin-bottom:8px;}
  .completion-card p{opacity:0.9;font-size:16px;margin-bottom:16px;}
  .restart-btn{
    background:white;color:var(--success);border:none;padding:12px 32px;
    border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;
  }

  /* STREAK */
  .streak-badge{
    display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
    background:var(--accent-bg);border-radius:20px;font-size:13px;font-weight:600;color:#92400e;
  }

  @media(max-width:600px){
    .card-sentence{font-size:17px;}
    .main{padding:16px;}
    .card-face{padding:24px 20px;}
    .stats-bar{gap:16px;}
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>Wörter in Sätzen lernen</h1>
  <p>A1 Vocabulary Flashcards — Learn words in context</p>
</div>

<div class="stats-bar">
  <div class="stat"><div class="num" id="statCorrect">0</div><div class="label">Correct</div></div>
  <div class="stat"><div class="num" id="statTotal">0</div><div class="label">Answered</div></div>
  <div class="stat"><div class="num" id="statPct">0%</div><div class="label">Accuracy</div></div>
  <div class="stat"><div class="num" id="statStreak">0 🔥</div><div class="label">Streak</div></div>
</div>

<div class="progress-row">

// ========== STATE ==========
let cards = [...allCards];
let currentIndex = 0;
let isFlipped = false;
let answered = false;
let lastResult = null;
let stats = JSON.parse(localStorage.getItem('vocabStats') || '{"correct":0,"total":0,"streak":0,"best":0}');
let activeFilter = 'Alle';

// ========== FILTERS ==========
function renderFilters() {
  const cats = ['Alle', ...new Set(allCards.map(c => c.cat))];
  document.getElementById('filterBar').innerHTML = cats.map(c =>
    `<div class="filter-chip ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c} ${c!=='Alle'?`(${allCards.filter(x=>x.cat===c).length})`:'('+allCards.length+')'}</div>`
  ).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  cards = cat === 'Alle' ? [...allCards] : allCards.filter(c => c.cat === cat);
  shuffleArray(cards);
  currentIndex = 0;
  isFlipped = false;
  answered = false;
  renderFilters();
  renderCard();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ========== RENDER ==========
function renderCard() {
  if (cards.length === 0) {
    document.getElementById('cardArea').innerHTML = '<p style="text-align:center;color:var(--g400);">No cards in this category.</p>';
    return;
  }
  if (currentIndex >= cards.length) {
    showCompletion();
    return;
  }

  const c = cards[currentIndex];
  const catClass = 'cat-' + c.cat.toLowerCase().replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u');
  const sentenceHTML = c.de.replace('___', '<span class="blank">?</span>');
  const fullSentenceHTML = c.de.replace('___', `<span class="word-highlight">${c.word}</span>`);

  // Handle separable verb answers for display
  const displayWord = c.word;

  document.getElementById('cardArea').innerHTML = `
    <div class="flashcard-container">
      <div class="flashcard${isFlipped?' flipped':''}" id="flashcard">
        <div class="card-face card-front">
          <span class="card-category ${catClass}">${c.cat}</span>
          <span class="card-number">${currentIndex+1} / ${cards.length}</span>
          <div class="card-sentence">${sentenceHTML}</div>
          <div class="card-hint">💡 ${c.hint}</div>
          <div class="input-area">
            <input type="text" id="answerInput" placeholder="Type the word..." autocomplete="off"
              ${answered?'disabled':''} class="${answered?(lastResult?'correct':'incorrect'):''}"
              value="${answered? document.getElementById('answerInput')?.value || '' : ''}">
            ${!answered ? `<button class="check-btn" onclick="checkAnswer()">✓</button>` : ''}
          </div>
        </div>
        <div class="card-face card-back">
          <span class="card-category ${catClass}">${c.cat}</span>
          <span class="card-number">${currentIndex+1} / ${cards.length}</span>
          ${answered ? `<div class="back-result ${lastResult?'correct':'incorrect'}">${lastResult?'✓ Correct!':'✗ Not quite'}</div>` : ''}
          <div class="back-sentence">${fullSentenceHTML}</div>
          <div class="back-translation">${c.en}</div>
          <div class="back-word-info">📘 ${c.info}</div>
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn prev" onclick="prevCard()" ${currentIndex===0?'disabled':''}>← Back</button>
      ${!isFlipped && answered ? `<button class="nav-btn flip" onclick="flipCard()">Flip 🔄</button>` : ''}
      ${isFlipped ? `<button class="nav-btn next" onclick="nextCard()">Next →</button>` : ''}
      ${!answered ? '' : (!isFlipped ? '' : '')}
    </div>
  `;

  if (!answered) {
    const input = document.getElementById('answerInput');
    if (input) { input.focus(); }
  }

  updateStats();
  updateProgress();
}

function checkAnswer() {
  const input = document.getElementById('answerInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;

  const c = cards[currentIndex];
  // Accept multiple formats: "kaufe ... ein" or "kaufe ein" or "kaufe...ein"
  const normalizedVal = val.toLowerCase().replace(/\s*\.\.\.\s*/g, ' ... ').replace(/\s+/g,' ').trim();
  const normalizedAns = c.word.toLowerCase().replace(/\s*\.\.\.\s*/g, ' ... ').replace(/\s+/g,' ').trim();

  // Also accept without the dots for separable verbs
  const altAns = normalizedAns.replace(' ... ', ' ');
  const altVal = normalizedVal.replace(' ... ', ' ');

  lastResult = normalizedVal === normalizedAns || altVal === altAns || val.toLowerCase() === c.word.toLowerCase();
  answered = true;

  stats.total++;
  if (lastResult) {
    stats.correct++;
    stats.streak++;
    if (stats.streak > stats.best) stats.best = stats.streak;
  } else {
    stats.streak = 0;
  }
  localStorage.setItem('vocabStats', JSON.stringify(stats));

  // Re-render to show result, then auto-flip
  renderCard();
  setTimeout(() => { if (answered && !isFlipped) flipCard(); }, 800);
}

function flipCard() {
  isFlipped = !isFlipped;
  renderCard();
}

function nextCard() {
  currentIndex++;
  isFlipped = false;
  answered = false;
  lastResult = null;
  renderCard();
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    isFlipped = false;
    answered = false;
    lastResult = null;
    renderCard();
  }
}

function showCompletion() {
  const pct = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
  document.getElementById('cardArea').innerHTML = `
    <div class="completion-card">
      <h2>🎉 Runde geschafft!</h2>
      <p>You completed all ${cards.length} cards in this set!</p>
      <p style="font-size:20px;margin:12px 0;">${stats.correct}/${stats.total} correct overall (${pct}%)</p>
      <p>Best streak: ${stats.best} 🔥</p>
      <button class="restart-btn" onclick="restart()">Shuffle & Restart 🔄</button>
    </div>
  `;
}

function restart() {
  shuffleArray(cards);
  currentIndex = 0;
  isFlipped = false;
  answered = false;
  lastResult = null;
  renderCard();
}

// ========== STATS & PROGRESS ==========
function updateStats() {
  document.getElementById('statCorrect').textContent = stats.correct;
  document.getElementById('statTotal').textContent = stats.total;
  const pct = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
  document.getElementById('statPct').textContent = pct + '%';
  document.getElementById('statStreak').textContent = stats.streak + ' 🔥';
}

function updateProgress() {
  const p = cards.length > 0 ? Math.round(((currentIndex) / cards.length) * 100) : 0;
  document.getElementById('progLabel').textContent = `Card ${Math.min(currentIndex+1, cards.length)} of ${cards.length}`;
  document.getElementById('progPct').textContent = p + '%';
  document.getElementById('progBar').style.width = p + '%';
}

// ========== KEYBOARD ==========
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !answered) {
    checkAnswer();
  } else if (e.key === 'ArrowRight' && isFlipped) {
    nextCard();
  } else if (e.key === 'ArrowLeft') {
    prevCard();
  } else if (e.key === ' ' && answered && !isFlipped) {
    e.preventDefault();
    flipCard();
  }
});

// ========== INIT ==========
shuffleArray(cards);
renderFilters();
renderCard();
</script>
