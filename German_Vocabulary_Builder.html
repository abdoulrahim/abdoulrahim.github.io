<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Vocabulary Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-controls {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .control-row {
                grid-template-columns: 1fr;
            }
        }

        select, button {
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #333;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.active {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.6);
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .content-area {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .flashcard {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease;
        }

        .flashcard:hover {
            transform: scale(1.02);
        }

        .flashcard.flipped {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .flashcard-front {
            display: none;
        }

        .flashcard.flipped .flashcard-front {
            display: block;
        }

        .flashcard.flipped .flashcard-back {
            display: none;
        }

        .flashcard-back {
            display: block;
        }

        .word-text {
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .word-level {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .example-sentence {
            font-size: 1.1em;
            font-style: italic;
            margin: 15px 0;
            max-width: 600px;
        }

        .translation {
            font-size: 1.8em;
            margin: 20px 0;
            font-weight: 600;
        }

        .article-badge {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 5px;
            margin: 10px 5px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .plural-form {
            font-size: 1em;
            opacity: 0.9;
            margin-top: 10px;
        }

        .card-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 10px 20px;
            font-size: 0.95em;
        }

        .quiz-question {
            background: #f0f4ff;
            padding: 30px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .quiz-text {
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: 600;
            color: #667eea;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .quiz-options {
                grid-template-columns: 1fr;
            }
        }

        .quiz-btn {
            padding: 20px;
            text-align: center;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 1.05em;
        }

        .quiz-btn:hover {
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .quiz-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .quiz-btn.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .article-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .article-options {
                grid-template-columns: 1fr;
            }
        }

        .spelling-input {
            font-size: 1.2em;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #667eea;
            border-radius: 5px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .feedback {
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            font-weight: 600;
            text-align: center;
        }

        .feedback.correct {
            background: #4caf50;
            color: white;
        }

        .feedback.incorrect {
            background: #f44336;
            color: white;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .weak-words-list {
            background: #fff3cd;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            border-left: 4px solid #ffc107;
        }

        .weak-words-list h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        .weak-word-item {
            background: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .weak-word-item button {
            padding: 5px 10px;
            font-size: 0.85em;
        }

        .hidden {
            display: none;
        }

        .mode-section {
            display: none;
        }

        .mode-section.active {
            display: block;
        }

        .card-counter {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin: 15px 0;
        }

        .streak-badge {
            background: #ff6b6b;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin: 10px 5px;
        }

        .show-examples-toggle {
            margin: 15px 0;
            display: flex;
            gap: 10px;
        }

        .topic-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .topic-info h3 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .topic-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
            margin: 10px 0;
        }

        .topic-name {
            font-weight: 600;
            color: #333;
        }

        .topic-stats {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .topic-percentage {
            color: #667eea;
            font-weight: bold;
            min-width: 50px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .flashcard {
                padding: 30px;
                min-height: 250px;
            }

            .word-text {
                font-size: 1.8em;
            }

            .translation {
                font-size: 1.4em;
            }

            .stat {
                padding: 10px;
            }

            .stat-value {
                font-size: 1.4em;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇩🇪 German Vocabulary Builder</h1>
            <p>Master German vocabulary with interactive flashcards and practice modes</p>
        </header>

        <div class="main-controls">
            <div class="control-row">
                <div>
                    <label for="topic-select">Topic:</label><br><br>
                    <select id="topic-select">
                        <option value="">All Topics</option>
                    </select>
                </div>
                <div>
                    <label for="level-select">Level:</label><br><br>
                    <select id="level-select">
                        <option value="">All Levels</option>
                        <option value="A1">A1 (Beginner)</option>
                        <option value="A2">A2 (Elementary)</option>
                        <option value="B1">B1 (Intermediate)</option>
                    </select>
                </div>
                <div>
                    <button onclick="loadVocabulary()">Apply Filters</button>
                    <button onclick="clearProgress()" style="margin-top: 10px;">Clear Progress</button>
                </div>
            </div>

            <div style="margin: 15px 0;">
                <label>Practice Mode:</label><br><br>
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="flashcard" onclick="switchMode('flashcard')">Flashcards</button>
                    <button class="mode-btn" data-mode="quiz" onclick="switchMode('quiz')">Quiz</button>
                    <button class="mode-btn" data-mode="article" onclick="switchMode('article')">Article Practice</button>
                    <button class="mode-btn" data-mode="spelling" onclick="switchMode('spelling')">Spelling</button>
                    <button class="mode-btn" data-mode="progress" onclick="switchMode('progress')">Progress</button>
                </div>
            </div>

            <div class="show-examples-toggle">
                <input type="checkbox" id="show-examples" checked>
                <label for="show-examples">Show example sentences</label>
            </div>

            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label">Score</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">Streak</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="card-count">0</div>
                    <div class="stat-label">Total Cards</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="mastered-count">0</div>
                    <div class="stat-label">Mastered</div>
                </div>
            </div>
        </div>

        <div class="content-area">
            <!-- FLASHCARD MODE -->
            <div id="flashcard-mode" class="mode-section active">
                <div class="topic-info" id="topic-info"></div>
                <div class="card-counter" id="card-counter"></div>

                <div class="flashcard" id="flashcard">
                    <div class="flashcard-front">
                        <div class="word-level" id="card-level"></div>
                        <div class="word-text" id="german-word"></div>
                        <div style="opacity: 0.8; font-size: 0.95em;">Click to reveal translation</div>
                    </div>
                    <div class="flashcard-back">
                        <div class="word-level" id="card-level-back"></div>
                        <div class="translation" id="english-translation"></div>
                        <div class="article-badge" id="article-display"></div>
                        <div class="plural-form" id="plural-display"></div>
                        <div class="example-sentence" id="example-de"></div>
                        <div class="example-sentence" id="example-en" style="color: rgba(255,255,255,0.9);"></div>
                    </div>
                </div>

                <div class="card-controls">
                    <button class="btn-small" onclick="toggleFlashcard()">Flip Card</button>
                    <button class="btn-small" onclick="markAsWeak()" style="background: #ff6b6b;">Need Practice</button>
                    <button class="btn-small" onclick="nextCard()" style="background: #4caf50;">Got It!</button>
                </div>

                <div id="weak-words" class="weak-words-list hidden">
                    <h3>Words to Practice</h3>
                    <div id="weak-words-content"></div>
                </div>
            </div>

            <!-- QUIZ MODE -->
            <div id="quiz-mode" class="mode-section">
                <div class="quiz-question">
                    <div class="card-counter" id="quiz-counter"></div>
                    <div class="quiz-text" id="quiz-text"></div>
                    <div class="quiz-options" id="quiz-options"></div>
                    <div id="quiz-feedback"></div>
                </div>
            </div>

            <!-- ARTICLE PRACTICE MODE -->
            <div id="article-mode" class="mode-section">
                <div class="quiz-question">
                    <div class="card-counter" id="article-counter"></div>
                    <div class="quiz-text" id="article-question"></div>
                    <div class="article-options" id="article-options"></div>
                    <div id="article-feedback"></div>
                </div>
            </div>

            <!-- SPELLING MODE -->
            <div id="spelling-mode" class="mode-section">
                <div class="quiz-question">
                    <div class="card-counter" id="spelling-counter"></div>
                    <div class="quiz-text" id="spelling-question"></div>
                    <input type="text" id="spelling-input" class="spelling-input" placeholder="Type the German word..." autocomplete="off">
                    <button onclick="checkSpelling()" style="margin-top: 10px;">Check</button>
                    <div id="spelling-feedback"></div>
                </div>
            </div>

            <!-- PROGRESS MODE -->
            <div id="progress-mode" class="mode-section">
                <h2>Your Progress</h2>
                <div id="progress-display"></div>
            </div>
        </div>
    </div>

                { word: "entspannen, hat entspannt", plural: "entspannen", english: "to relax", article: "verb", gender: "v", example_de: "Ich entspanne mich.", example_en: "I relax.", level: "A1" }
            ],
            "Berufsleben": [
                { word: "der Journalist", plural: "die Journalisten", english: "journalist (m)", article: "der", gender: "m", example_de: "Der Journalist schreibt Artikel.", example_en: "The journalist writes articles.", level: "A1" },
                { word: "die Journalistin", plural: "die Journalistinnen", english: "journalist (f)", article: "die", gender: "f", example_de: "Die Journalistin ist bekannt.", example_en: "The journalist is famous.", level: "A1" },
                { word: "der Pilot", plural: "die Piloten", english: "pilot (m)", article: "der", gender: "m", example_de: "Der Pilot fliegt das Flugzeug.", example_en: "The pilot flies the plane.", level: "A1" },
                { word: "die Pilotin", plural: "die Pilotinnen", english: "pilot (f)", article: "die", gender: "f", example_de: "Die Pilotin ist erfahren.", example_en: "The pilot is experienced.", level: "A1" },
                { word: "der Hausmann", plural: "die Hausmänner", english: "househusband", article: "der", gender: "m", example_de: "Der Hausmann kocht.", example_en: "The househusband cooks.", level: "A2" },
                { word: "die Hausfrau", plural: "die Hausfrauen", english: "housewife", article: "die", gender: "f", example_de: "Die Hausfrau putzt das Haus.", example_en: "The housewife cleans the house.", level: "A1" },
                { word: "der Schauspieler", plural: "die Schauspieler", english: "actor", article: "der", gender: "m", example_de: "Der Schauspieler ist berühmt.", example_en: "The actor is famous.", level: "A1" },
                { word: "die Schauspielerin", plural: "die Schauspielerinnen", english: "actress", article: "die", gender: "f", example_de: "Die Schauspielerin spielt eine Rolle.", example_en: "The actress plays a role.", level: "A1" },
                { word: "der Fitnesstrainer", plural: "die Fitnesstrainer", english: "fitness trainer (m)", article: "der", gender: "m", example_de: "Der Fitnesstrainer ist fit.", example_en: "The fitness trainer is fit.", level: "A1" },
                { word: "die Fitnesstrainerin", plural: "die Fitnesstrainerinnen", english: "fitness trainer (f)", article: "die", gender: "f", example_de: "Die Fitnesstrainerin hilft mir.", example_en: "The fitness trainer helps me.", level: "A1" },
                { word: "der Krankenpfleger", plural: "die Krankenpfleger", english: "male nurse", article: "der", gender: "m", example_de: "Der Krankenpfleger arbeitet im Krankenhaus.", example_en: "The male nurse works in the hospital.", level: "A2" },
                { word: "der Automechaniker", plural: "die Automechaniker", english: "car mechanic (m)", article: "der", gender: "m", example_de: "Der Automechaniker repariert Autos.", example_en: "The car mechanic repairs cars.", level: "A1" },
                { word: "die Automechanikerin", plural: "die Automechanikerinnen", english: "car mechanic (f)", article: "die", gender: "f", example_de: "Die Automechanikerin ist kompetent.", example_en: "The car mechanic is competent.", level: "A1" },
                { word: "der Verkäufer", plural: "die Verkäufer", english: "salesman", article: "der", gender: "m", example_de: "Der Verkäufer ist freundlich.", example_en: "The salesman is friendly.", level: "A1" },
                { word: "die Verkäuferin", plural: "die Verkäuferinnen", english: "saleswoman", article: "die", gender: "f", example_de: "Die Verkäuferin hilft mir.", example_en: "The saleswoman helps me.", level: "A1" },
                { word: "die Küchenhilfe", plural: "die Küchenhilfen", english: "kitchen helper", article: "die", gender: "f", example_de: "Die Küchenhilfe arbeitet in der Küche.", example_en: "The kitchen helper works in the kitchen.", level: "A2" },
                { word: "zusammen arbeiten, hat zusammengearbeitet", plural: "zusammen arbeiten", english: "to work together", article: "verb", gender: "v", example_de: "Wir arbeiten zusammen.", example_en: "We work together.", level: "A1" },
                { word: "gearbeitet", plural: "gearbeitet", english: "worked", article: "verb", gender: "v", example_de: "Ich habe gearbeitet.", example_en: "I worked.", level: "A1" },
                { word: "verdienen, hat verdient", plural: "verdienen", english: "to earn", article: "verb", gender: "v", example_de: "Er verdient viel Geld.", example_en: "He earns a lot of money.", level: "A2" },
                { word: "planen, hat geplant", plural: "planen", english: "to plan", article: "verb", gender: "v", example_de: "Ich plane mein Wochenende.", example_en: "I plan my weekend.", level: "A1" },
                { word: "schälen, hat geschält", plural: "schälen", english: "to peel", article: "verb", gender: "v", example_de: "Ich schäle die Kartoffeln.", example_en: "I peel the potatoes.", level: "A2" },
                { word: "reisen, ist gereist / hat gereist", plural: "reisen", english: "to travel", article: "verb", gender: "v", example_de: "Ich reise gerne.", example_en: "I like to travel.", level: "A1" },
                { word: "ist gereist", plural: "ist gereist", english: "has traveled", article: "verb", gender: "v", example_de: "Er ist gereist.", example_en: "He has traveled.", level: "A1" },
                { word: "eine Auszeit nehmen", plural: "eine Auszeit nehmen", english: "to take a break/time off", article: "verb", gender: "v", example_de: "Ich nehme eine Auszeit.", example_en: "I take a break.", level: "A2" }
            ]
        };

        // STATE MANAGEMENT
        let currentVocabulary = [];
        let currentCardIndex = 0;
        let score = 0;
        let streak = 0;
        let weakWords = new Set();
        let progress = {};
        let currentMode = 'flashcard';
        let showExamples = true;

        // POSITION PERSISTENCE
        const VB_POS_KEY = 'vocabBuilderPosV1';
        function _savePos() {
            try {
                localStorage.setItem(VB_POS_KEY, JSON.stringify({
                    mode: currentMode,
                    idx: currentCardIndex,
                    topic: document.getElementById('topic-select')?.value || '',
                    level: document.getElementById('level-select')?.value || '',
                    showExamples: showExamples
                }));
            } catch {}
        }
        function _loadPos() {
            try { return JSON.parse(localStorage.getItem(VB_POS_KEY)) || null; } catch { return null; }
        }

        // INITIALIZE
        function init() {
            // Dynamically populate topic dropdown from data
            const topicSelect = document.getElementById('topic-select');
            Object.keys(vocabularyData).forEach(topic => {
                const opt = document.createElement('option');
                opt.value = topic;
                opt.textContent = topic;
                topicSelect.appendChild(opt);
            });
            loadProgress();

            // Restore saved position before loading vocabulary
            const saved = _loadPos();
            if (saved) {
                if (typeof saved.showExamples === 'boolean') {
                    showExamples = saved.showExamples;
                    const ex = document.getElementById('show-examples');
                    if (ex) ex.checked = saved.showExamples;
                }
                if (saved.topic !== undefined) {
                    const t = document.getElementById('topic-select');
                    if (t && (saved.topic === '' || [...t.options].some(o => o.value === saved.topic))) {
                        t.value = saved.topic;
                    }
                }
                if (saved.level !== undefined) {
                    const l = document.getElementById('level-select');
                    if (l) l.value = saved.level;
                }
                if (saved.mode && saved.mode !== 'flashcard') {
                    // Apply mode UI then let loadVocabulary render
                    currentMode = saved.mode;
                    document.querySelectorAll('.mode-section').forEach(el => el.classList.remove('active'));
                    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                    const modeEl = document.getElementById(saved.mode + '-mode');
                    if (modeEl) modeEl.classList.add('active');
                    const modeBtn = document.querySelector(`[data-mode="${saved.mode}"]`);
                    if (modeBtn) modeBtn.classList.add('active');
                }
            }

            loadVocabulary();

            // After load, restore card index if valid
            if (saved && typeof saved.idx === 'number' && saved.idx >= 0 && saved.idx < currentVocabulary.length) {
                currentCardIndex = saved.idx;
                if (currentMode === 'flashcard') displayFlashcard();
                else if (currentMode === 'quiz') displayQuiz();
                else if (currentMode === 'article') displayArticleQuestion();
                else if (currentMode === 'spelling') displaySpellingQuestion();
                else if (currentMode === 'progress') displayProgress();
            }

            updateStats();

            // Wire select-change autosave
            const tSel = document.getElementById('topic-select');
            const lSel = document.getElementById('level-select');
            if (tSel) tSel.addEventListener('change', _savePos);
            if (lSel) lSel.addEventListener('change', _savePos);
        }

        // LOCAL STORAGE FUNCTIONS
        function saveProgress() {
            try {
                localStorage.setItem('germanVocabProgress', JSON.stringify(progress));
                localStorage.setItem('germanVocabWeakWords', JSON.stringify([...weakWords]));
                localStorage.setItem('germanVocabScore', JSON.stringify(score));
                localStorage.setItem('germanVocabStreak', JSON.stringify(streak));
            } catch (e) {
                console.log('LocalStorage not available:', e);
            }
        }

        function loadProgress() {
            try {
                const savedProgress = localStorage.getItem('germanVocabProgress');
                const savedWeak = localStorage.getItem('germanVocabWeakWords');
                const savedScore = localStorage.getItem('germanVocabScore');
                const savedStreak = localStorage.getItem('germanVocabStreak');

                progress = savedProgress ? JSON.parse(savedProgress) : {};
                weakWords = savedWeak ? new Set(JSON.parse(savedWeak)) : new Set();
                score = savedScore ? JSON.parse(savedScore) : 0;
                streak = savedStreak ? JSON.parse(savedStreak) : 0;
            } catch (e) {
                console.log('Could not load progress:', e);
            }
        }

        function clearProgress() {
            if (confirm('Clear all progress? This cannot be undone.')) {
                try {
                    localStorage.removeItem('germanVocabProgress');
                    localStorage.removeItem('germanVocabWeakWords');
                    localStorage.removeItem('germanVocabScore');
                    localStorage.removeItem('germanVocabStreak');
                } catch (e) {}
                progress = {};
                weakWords = new Set();
                score = 0;
                streak = 0;
                loadVocabulary();
                updateStats();
            }
        }

        // VOCABULARY MANAGEMENT
        function loadVocabulary() {
            const topic = document.getElementById('topic-select').value;
            const level = document.getElementById('level-select').value;

            currentVocabulary = [];
            for (let t in vocabularyData) {
                if (!topic || topic === t) {
                    vocabularyData[t].forEach(word => {
                        if (!level || level === word.level) {
                            currentVocabulary.push({ ...word, topic: t });
                        }
                    });
                }
            }

            currentCardIndex = 0;
            updateTopicInfo();
            if (currentMode === 'flashcard') displayFlashcard();
            else if (currentMode === 'quiz') displayQuiz();
            else if (currentMode === 'article') displayArticleQuestion();
            else if (currentMode === 'spelling') displaySpellingQuestion();
            if (typeof _savePos === 'function') _savePos();
        }

        function updateTopicInfo() {
            const topic = document.getElementById('topic-select').value;
            const infoDiv = document.getElementById('topic-info');
            if (topic && currentVocabulary.length > 0) {
                const count = currentVocabulary.length;
                const mastered = currentVocabulary.filter(w => progress[w.word]?.mastered).length;
                infoDiv.innerHTML = `<h3>${topic}</h3><p>${count} words - ${mastered} mastered</p>`;
            } else if (!topic) {
                infoDiv.innerHTML = '<h3>All Topics</h3><p>' + currentVocabulary.length + ' total words</p>';
            }
        }

        // FLASHCARD FUNCTIONS
        function displayFlashcard() {
            if (currentVocabulary.length === 0) {
                document.getElementById('flashcard').innerHTML = '<p>No words to display. Select a topic and level.</p>';
                return;
            }

            const card = currentVocabulary[currentCardIndex];
            document.getElementById('flashcard').classList.remove('flipped');

            document.getElementById('german-word').textContent = card.word;
            document.getElementById('card-level').textContent = card.level;
            document.getElementById('card-level-back').textContent = card.level;
            document.getElementById('english-translation').textContent = card.english;
            document.getElementById('article-display').textContent = card.article;

            if (card.word !== card.plural) {
                document.getElementById('plural-display').textContent = `Plural: ${card.plural}`;
            } else {
                document.getElementById('plural-display').textContent = '';
            }

            const showEx = document.getElementById('show-examples').checked;
            if (showEx) {
                document.getElementById('example-de').textContent = card.example_de;
                document.getElementById('example-en').textContent = card.example_en;
            } else {
                document.getElementById('example-de').textContent = '';
                document.getElementById('example-en').textContent = '';
            }

            updateCardCounter();
            updateWeakWordsDisplay();
        }

        function toggleFlashcard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function nextCard() {
            const card = currentVocabulary[currentCardIndex];
            if (!progress[card.word]) progress[card.word] = {};
            progress[card.word].mastered = true;
            progress[card.word].lastReviewed = new Date().toISOString();
            weakWords.delete(card.word);

            score++;
            streak++;

            currentCardIndex = (currentCardIndex + 1) % currentVocabulary.length;
            displayFlashcard();
            updateStats();
            saveProgress();
            _savePos();
        }

        function markAsWeak() {
            const card = currentVocabulary[currentCardIndex];
            weakWords.add(card.word);
            if (!progress[card.word]) progress[card.word] = {};
            progress[card.word].needsPractice = true;

            streak = 0;
            currentCardIndex = (currentCardIndex + 1) % currentVocabulary.length;
            displayFlashcard();
            updateStats();
            saveProgress();
            _savePos();
        }

        function updateCardCounter() {
            const total = currentVocabulary.length;
            const current = currentCardIndex + 1;
            document.getElementById('card-counter').textContent = `Card ${current} of ${total}`;
        }

        function updateWeakWordsDisplay() {
            const weakWordsDiv = document.getElementById('weak-words');
            if (weakWords.size > 0) {
                weakWordsDiv.classList.remove('hidden');
                let html = '';
                weakWords.forEach(word => {
                    html += `<div class="weak-word-item"><span>${word}</span><button onclick="focusWord('${word}')" class="btn-small">Focus</button></div>`;
                });
                document.getElementById('weak-words-content').innerHTML = html;
            } else {
                weakWordsDiv.classList.add('hidden');
            }
        }

        function focusWord(word) {
            const index = currentVocabulary.findIndex(v => v.word === word);
            if (index !== -1) {
                currentCardIndex = index;
                displayFlashcard();
                _savePos();
            }
        }

        // QUIZ FUNCTIONS
        function displayQuiz() {
            if (currentVocabulary.length === 0) {
                document.getElementById('quiz-question').innerHTML = '<p>No words to display. Select a topic and level.</p>';
                return;
            }

            const card = currentVocabulary[currentCardIndex];
            const quizType = Math.random() > 0.5 ? 'german' : 'english';

            let options = [card];
            while (options.length < 4) {
                const topicData = vocabularyData[Object.keys(vocabularyData)[Math.floor(Math.random() * Object.keys(vocabularyData).length)]];
                const random = topicData[Math.floor(Math.random() * topicData.length)];
                if (!options.find(o => o.word === random.word)) options.push(random);
            }
            options.sort(() => Math.random() - 0.5);

            let questionText, correctAnswer;
            if (quizType === 'german') {
                questionText = `Find the German word for: <strong>${card.english}</strong>`;
                correctAnswer = card.word;
            } else {
                questionText = `What does <strong>${card.word}</strong> mean?`;
                correctAnswer = card.english;
            }

            document.getElementById('quiz-text').innerHTML = questionText;
            document.getElementById('quiz-counter').textContent = `Question ${currentCardIndex + 1} of ${currentVocabulary.length}`;

            let optionsHtml = '';
            options.forEach(opt => {
                const displayText = quizType === 'german' ? opt.word : opt.english;
                optionsHtml += `<button class="quiz-btn" onclick="checkQuizAnswer('${displayText}', '${correctAnswer}', this)">${displayText}</button>`;
            });
            document.getElementById('quiz-options').innerHTML = optionsHtml;
            document.getElementById('quiz-feedback').innerHTML = '';
        }

        function checkQuizAnswer(selected, correct, btn) {
            const isCorrect = selected === correct;
            if (isCorrect) {
                btn.classList.add('correct');
                document.getElementById('quiz-feedback').innerHTML = '<div class="feedback correct">Correct!</div>';
                score++;
                streak++;
                const card = currentVocabulary[currentCardIndex];
                if (!progress[card.word]) progress[card.word] = {};
                progress[card.word].mastered = true;
                weakWords.delete(card.word);
            } else {
                btn.classList.add('incorrect');
                document.getElementById('quiz-feedback').innerHTML = `<div class="feedback incorrect">Incorrect! The answer is <strong>${correct}</strong></div>`;
                streak = 0;
                const card = currentVocabulary[currentCardIndex];
                if (!progress[card.word]) progress[card.word] = {};
                progress[card.word].needsPractice = true;
                weakWords.add(card.word);
            }
            saveProgress();
            updateStats();
            setTimeout(() => {
                currentCardIndex = (currentCardIndex + 1) % currentVocabulary.length;
                displayQuiz();
            }, 2000);
        }

        // ARTICLE PRACTICE
        function displayArticleQuestion() {
            if (currentVocabulary.length === 0) {
                document.getElementById('article-question').innerHTML = '<p>No nouns to display. Select a topic with nouns.</p>';
                return;
            }

            // Only allow noun entries (masculine/feminine/neuter) — skip verbs, adjectives, phrases, pronouns, plurals, prepositions, adverbs, possessives, etc.
            const hasNoun = currentVocabulary.some(c => c.gender === 'm' || c.gender === 'f' || c.gender === 'n');
            if (!hasNoun) {
                document.getElementById('article-question').innerHTML = '<p>No nouns to display. Select a topic with nouns.</p>';
                document.getElementById('article-options').innerHTML = '';
                document.getElementById('article-counter').textContent = '';
                document.getElementById('article-feedback').innerHTML = '';
                return;
            }
            let card = currentVocabulary[currentCardIndex];
            while (card.gender !== 'm' && card.gender !== 'f' && card.gender !== 'n') {
                currentCardIndex = (currentCardIndex + 1) % currentVocabulary.length;
                card = currentVocabulary[currentCardIndex];
            }

            const nounWithoutArticle = card.word.split(' ').slice(1).join(' ');
            document.getElementById('article-question').innerHTML = `Select the correct article for: <strong>${nounWithoutArticle}</strong>`;
            document.getElementById('article-counter').textContent = `Question ${currentCardIndex + 1} of ${currentVocabulary.length}`;

            document.getElementById('article-options').innerHTML = `
                <button class="quiz-btn" onclick="checkArticle('der', '${card.article}', this)">der</button>
                <button class="quiz-btn" onclick="checkArticle('die', '${card.article}', this)">die</button>
                <button class="quiz-btn" onclick="checkArticle('das', '${card.article}', this)">das</button>
            `;
            document.getElementById('article-feedback').innerHTML = '';
        }

        function checkArticle(selected, correct, btn) {
            const isCorrect = selected === correct;
            if (isCorrect) {
                btn.classList.add('correct');
                document.getElementById('article-feedback').innerHTML = '<div class="feedback correct">Correct!</div>';
                score++;
                streak++;
                const card = currentVocabulary[currentCardIndex];
                if (!progress[card.word]) progress[card.word] = {};
                progress[card.word].mastered = true;
                weakWords.delete(card.word);
            } else {
                btn.classList.add('incorrect');
                document.getElementById('article-feedback').innerHTML = `<div class="feedback incorrect">Incorrect! The answer is <strong>${correct}</strong></div>`;
                streak = 0;
                const card = currentVocabulary[currentCardIndex];
                if (!progress[card.word]) progress[card.word] = {};
                progress[card.word].needsPractice = true;
                weakWords.add(card.word);
            }
            saveProgress();
            updateStats();
            setTimeout(() => {
                currentCardIndex = (currentCardIndex + 1) % currentVocabulary.length;
                displayArticleQuestion();
            }, 2000);
        }

        // SPELLING PRACTICE
        function displaySpellingQuestion() {
            if (currentVocabulary.length === 0) {
                document.getElementById('spelling-question').innerHTML = '<p>No words to display. Select a topic and level.</p>';
                return;
            }

            const card = currentVocabulary[currentCardIndex];
            document.getElementById('spelling-question').innerHTML = `Type the German word for: <strong>${card.english}</strong>`;
            document.getElementById('spelling-counter').textContent = `Question ${currentCardIndex + 1} of ${currentVocabulary.length}`;
            document.getElementById('spelling-input').value = '';
            document.getElementById('spelling-input').focus();
            document.getElementById('spelling-feedback').innerHTML = '';
        }

        function checkSpelling() {
            const card = currentVocabulary[currentCardIndex];
            // Case-sensitive: German nouns must be capitalized; verbs are lowercase.
            const input = document.getElementById('spelling-input').value.trim();
            const correct = card.word;

            const isCorrect = input === correct;
            if (isCorrect) {
                document.getElementById('spelling-feedback').innerHTML = '<div class="feedback correct">Correct!</div>';
                score++;
                streak++;
                if (!progress[card.word]) progress[card.word] = {};
                progress[card.word].mastered = true;
                weakWords.delete(card.word);
            } else {
                document.getElementById('spelling-feedback').innerHTML = `<div class="feedback incorrect">Incorrect! The answer is <strong>${card.word}</strong></div>`;
                streak = 0;
                if (!progress[card.word]) progress[card.word] = {};
                progress[card.word].needsPractice = true;
                weakWords.add(card.word);
            }
            saveProgress();
            updateStats();
            setTimeout(() => {
                currentCardIndex = (currentCardIndex + 1) % currentVocabulary.length;
                displaySpellingQuestion();
            }, 2000);
        }

        // PROGRESS DISPLAY
        function displayProgress() {
            let html = '<h3>Topic Progress</h3>';
            for (let topic in vocabularyData) {
                const words = vocabularyData[topic];
                const mastered = words.filter(w => progress[w.word]?.mastered).length;
                const percentage = Math.round((mastered / words.length) * 100);

                html += `
                    <div class="topic-progress">
                        <div class="topic-name">${topic}</div>
                        <div class="progress-bar" style="flex: 1; margin: 0 15px;">
                            <div class="progress-fill" style="width: ${percentage}%"></div>
                        </div>
                        <div class="topic-percentage">${mastered}/${words.length} (${percentage}%)</div>
                    </div>
                `;
            }

            if (weakWords.size > 0) {
                html += '<h3 style="margin-top: 20px;">Words Needing Practice</h3>';
                weakWords.forEach(word => {
                    html += `<div class="weak-word-item"><span>${word}</span></div>`;
                });
            }

            document.getElementById('progress-display').innerHTML = html;
        }

        // MODE SWITCHING
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(mode + '-mode').classList.add('active');
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');

            if (mode === 'flashcard') displayFlashcard();
            else if (mode === 'quiz') displayQuiz();
            else if (mode === 'article') displayArticleQuestion();
            else if (mode === 'spelling') displaySpellingQuestion();
            else if (mode === 'progress') displayProgress();
            _savePos();
        }

        // STATISTICS
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('card-count').textContent = currentVocabulary.length;

            let mastered = 0;
            for (let topic in vocabularyData) {
                mastered += vocabularyData[topic].filter(w => progress[w.word]?.mastered).length;
            }
            document.getElementById('mastered-count').textContent = mastered;
        }

        // EVENT LISTENERS
        document.getElementById('show-examples').addEventListener('change', () => {
            showExamples = document.getElementById('show-examples').checked;
            displayFlashcard();
            _savePos();
        });

        // KEYBOARD SUPPORT
        document.addEventListener('keydown', (e) => {
            if (currentMode === 'flashcard' && e.key === ' ') {
                e.preventDefault();
                toggleFlashcard();
            } else if (currentMode === 'spelling' && e.key === 'Enter') {
                e.preventDefault();
                checkSpelling();
            }
        });

        // INITIALIZE ON LOAD
        window.addEventListener('load', init);
    </script>
</body>
</html>
