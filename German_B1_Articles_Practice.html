<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Der, Die, Das — B1 Articles Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  :root{
    --der:#3b82f6;--der-bg:#dbeafe;--der-dark:#1e40af;
    --die:#ec4899;--die-bg:#fce7f3;--die-dark:#9d174d;
    --das:#8b5cf6;--das-bg:#ede9fe;--das-dark:#5b21b6;
    --success:#10b981;--success-bg:#d1fae5;
    --error:#ef4444;--error-bg:#fee2e2;
    --accent:#f59e0b;--accent-bg:#fef3c7;
    --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;}

  .header{background:linear-gradient(135deg,#dc2626,#9333ea,#1e40af);color:white;padding:24px;text-align:center;}
  .header h1{font-size:24px;font-weight:800;letter-spacing:-0.5px;}
  .header .level-badge{display:inline-block;background:rgba(255,255,255,0.25);padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:6px;}
  .header p{font-size:13px;opacity:0.85;margin-top:4px;}
  .header .legend{display:flex;justify-content:center;gap:16px;margin-top:12px;flex-wrap:wrap;}
  .header .legend span{font-size:13px;font-weight:600;padding:4px 12px;border-radius:16px;}
  .legend .m{background:var(--der-bg);color:var(--der-dark);}
  .legend .f{background:var(--die-bg);color:var(--die-dark);}
  .legend .n{background:var(--das-bg);color:var(--das-dark);}

  .stats-bar{display:flex;justify-content:center;gap:20px;padding:14px;background:white;border-bottom:1px solid var(--g200);flex-wrap:wrap;}
  .stat{text-align:center;}
  .stat .num{font-size:22px;font-weight:800;}
  .stat .num.c-correct{color:var(--success);}
  .stat .num.c-wrong{color:var(--error);}
  .stat .num.c-streak{color:var(--accent);}
  .stat .lbl{font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:0.5px;}

  .progress-row{padding:10px 24px;background:white;border-bottom:1px solid var(--g200);}
  .prog-outer{height:6px;background:var(--g100);border-radius:3px;overflow:hidden;}
  .prog-inner{height:100%;border-radius:3px;transition:width 0.4s;background:linear-gradient(90deg,#dc2626,#9333ea,var(--der));}
  .prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--g400);margin-bottom:4px;}

  .mode-bar{display:flex;gap:0;background:white;border-bottom:1px solid var(--g200);}
  .mode-tab{
    flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;
    color:var(--g400);border-bottom:3px solid transparent;transition:all 0.2s;
  }
  .mode-tab:hover{color:var(--g700);}
  .mode-tab.active{color:var(--der-dark);border-bottom-color:var(--der);}

  .filter-row{display:flex;gap:8px;padding:12px 24px;overflow-x:auto;background:white;border-bottom:1px solid var(--g200);}
  .chip{
    padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
    border:2px solid var(--g200);background:white;color:var(--g600);white-space:nowrap;transition:all 0.2s;
  }
  .chip:hover{border-color:var(--der);}
  .chip.active{background:var(--g900);color:white;border-color:var(--g900);}

  .main{max-width:600px;margin:0 auto;padding:24px;}

  .quiz-card{
    background:white;border-radius:16px;padding:40px 32px;text-align:center;
    box-shadow:0 4px 24px rgba(0,0,0,0.06);margin-bottom:20px;position:relative;
    border:2px solid var(--g200);transition:border-color 0.3s;
  }
  .quiz-card.flash-der{border-color:var(--der);box-shadow:0 0 30px rgba(59,130,246,0.2);}
  .quiz-card.flash-die{border-color:var(--die);box-shadow:0 0 30px rgba(236,72,153,0.2);}
  .quiz-card.flash-das{border-color:var(--das);box-shadow:0 0 30px rgba(139,92,246,0.2);}

  .quiz-card .card-num{position:absolute;top:16px;right:20px;font-size:12px;color:var(--g400);}
  .quiz-card .noun{font-size:36px;font-weight:900;margin-bottom:8px;letter-spacing:-1px;}
  .quiz-card .noun-en{font-size:14px;color:var(--g400);margin-bottom:6px;font-style:italic;}
  .quiz-card .plural{font-size:13px;color:var(--g500);margin-bottom:24px;}
  .quiz-card .sentence{font-size:15px;color:var(--g600);margin-bottom:24px;line-height:1.6;padding:12px 16px;background:var(--g50);border-radius:8px;}
  .quiz-card .sentence b{color:var(--g900);}

  .gender-btns{display:flex;gap:12px;justify-content:center;margin-bottom:16px;}
  .gender-btn{
    padding:14px 28px;border-radius:12px;font-size:18px;font-weight:800;cursor:pointer;
    border:3px solid;transition:all 0.2s;min-width:100px;
  }
  .gender-btn:hover{transform:scale(1.05);}
  .gender-btn.btn-der{border-color:var(--der);color:var(--der);background:var(--der-bg);}
  .gender-btn.btn-die{border-color:var(--die);color:var(--die);background:var(--die-bg);}
  .gender-btn.btn-das{border-color:var(--das);color:var(--das);background:var(--das-bg);}
  .gender-btn.correct{background:var(--success-bg)!important;border-color:var(--success)!important;color:#065f46!important;}
  .gender-btn.wrong{background:var(--error-bg)!important;border-color:var(--error)!important;color:#991b1b!important;opacity:0.5;}
  .gender-btn:disabled{cursor:default;transform:none;}

  .result-line{font-size:15px;font-weight:600;margin-top:12px;min-height:24px;}
  .result-line.r-correct{color:var(--success);}
  .result-line.r-wrong{color:var(--error);}

  .tip-box{background:var(--accent-bg);border-radius:8px;padding:10px 14px;font-size:13px;color:#78350f;margin-top:12px;text-align:left;display:none;}
  .tip-box.show{display:block;}

  .sent-card{
    background:white;border-radius:16px;padding:32px;
    box-shadow:0 4px 24px rgba(0,0,0,0.06);margin-bottom:20px;
    border:2px solid var(--g200);
  }
  .sent-card .sent-num{font-size:12px;color:var(--g400);margin-bottom:12px;}
  .sent-text{font-size:18px;line-height:2;margin-bottom:16px;}
  .sent-text .blank-input{
    width:80px;border:none;border-bottom:3px solid var(--g300);font-size:18px;
    text-align:center;font-family:inherit;outline:none;background:transparent;
    transition:border-color 0.2s;font-weight:700;
  }
  .sent-text .blank-input:focus{border-bottom-color:var(--der);}
  .sent-text .blank-input.correct{border-bottom-color:var(--success);color:var(--success);background:var(--success-bg);}
  .sent-text .blank-input.incorrect{border-bottom-color:var(--error);color:var(--error);background:var(--error-bg);}
  .sent-hint{font-size:13px;color:var(--g400);font-style:italic;margin-bottom:12px;}
  .sent-en{font-size:13px;color:var(--g500);margin-top:8px;display:none;}
  .sent-en.show{display:block;}

  .speed-area{text-align:center;}
  .speed-timer{font-size:48px;font-weight:900;color:var(--g900);margin:16px 0;}
  .speed-noun{font-size:42px;font-weight:900;margin:24px 0;letter-spacing:-1px;}
  .speed-score{font-size:18px;color:var(--g600);margin:12px 0;}
  .speed-start{
    padding:16px 48px;background:linear-gradient(135deg,#dc2626,#9333ea);color:white;
    border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;
  }
  .speed-start:hover{transform:scale(1.05);}

  .nav-row{display:flex;gap:12px;justify-content:center;margin:20px 0;}
  .nav-btn{
    padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;
    cursor:pointer;transition:all 0.2s;border:none;
  }
  .nav-btn.prev{background:var(--g100);color:var(--g700);}
  .nav-btn.next{background:var(--g900);color:white;}
  .nav-btn:disabled{opacity:0.3;cursor:default;}
  .nav-btn:hover:not(:disabled){transform:translateY(-1px);}

  .kbd-hint{text-align:center;font-size:11px;color:var(--g400);margin-top:8px;}
  .kbd-hint kbd{background:var(--g100);border:1px solid var(--g300);padding:1px 5px;border-radius:3px;font-family:inherit;font-size:10px;}

  .done-card{background:linear-gradient(135deg,var(--success),#059669);color:white;border-radius:16px;padding:48px 32px;text-align:center;margin:24px 0;}
  .done-card h2{font-size:28px;margin-bottom:8px;}
  .done-card p{opacity:0.9;margin-bottom:16px;}
  .done-card button{background:white;color:var(--success);border:none;padding:12px 32px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;}

  @media(max-width:500px){
    .quiz-card .noun{font-size:28px;}
    .gender-btn{padding:12px 20px;font-size:16px;min-width:80px;}
    .main{padding:16px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="level-badge">B1 — Intermediate</div>
  <h1>Der, Die oder Das?</h1>
  <p>B1-level nouns with Genitiv, Relativpronomen & n-Deklination</p>
  <div class="legend">
    <span class="m">der — maskulin</span>
    <span class="f">die — feminin</span>
    <span class="n">das — neutral</span>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="num c-correct" id="sCorrect">0</div><div class="lbl">Correct</div></div>
  <div class="stat"><div class="num c-wrong" id="sWrong">0</div><div class="lbl">Wrong</div></div>
  <div class="stat"><div class="num" id="sAccuracy">—</div><div class="lbl">Accuracy</div></div>
  <div class="stat"><div class="num c-streak" id="sStreak">0</div><div class="lbl">Streak</div></div>
</div>

<div class="progress-row">
  <div class="prog-label"><span id="pLabel">Card 1</span><span id="pPct">0%</span></div>
  <div class="prog-outer"><div class="prog-inner" id="pBar" style="width:0%"></div></div>
</div>

<div class="mode-bar">
  <div class="mode-tab active" onclick="setMode('gender')">🎯 Gender Quiz</div>
  <div class="mode-tab" onclick="setMode('sentences')">✏️ Articles in Sentences</div>
  <div class="mode-tab" onclick="setMode('speed')">⚡ Speed Round</div>
</div>

<div class="filter-row" id="filterRow"></div>

<div class="main" id="mainArea"></div>

<script>
// ============ B1 NOUN DATA ============
const nouns = [
  // ---- Maskulin (der) ----

  {noun:'Staat',article:'der',en:'state/government',plural:'Staaten',cat:'Politik',tip:'Der Staat — masculine.',
   sent:'___ Staat muss die Bürger schützen.',sentEn:'The state must protect its citizens.'},
  {noun:'Einfluss',article:'der',en:'influence',plural:'Einflüsse',cat:'Politik',tip:'Der Einfluss — masculine.',
   sent:'___ Einfluss der Medien ist groß.',sentEn:'The influence of the media is large.'},
  {noun:'Fortschritt',article:'der',en:'progress',plural:'Fortschritte',cat:'Politik',tip:'Der Fortschritt — masculine.',

  {noun:'Konflikt',article:'der',en:'conflict',plural:'Konflikte',cat:'Politik',tip:'Der Konflikt — masculine.',

  {noun:'Handel',article:'der',en:'trade/commerce',plural:'—',cat:'Wirtschaft',tip:'Der Handel — masculine.',

  {noun:'Gespräch',article:'das',en:'conversation',plural:'Gespräche',cat:'Kommunikation',tip:'Ge- prefix → often das.',

// ========== STATE ==========
let mode='gender';
let filtered=[...nouns];
let idx=0;
let answered=false;
let stats=JSON.parse(localStorage.getItem('artStatsB1')||'{"c":0,"w":0,"streak":0,"best":0}');
let activeFilter='Alle';
let speedActive=false;
let speedTimer=null;
let speedTime=30;
let speedScore=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

// ========== FILTERS ==========
function renderFilters(){
  const cats=['Alle',...new Set(nouns.map(n=>n.cat))];
  document.getElementById('filterRow').innerHTML=cats.map(c=>
    `<div class="chip ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c} (${c==='Alle'?nouns.length:nouns.filter(x=>x.cat===c).length})</div>`
  ).join('');
}
function setFilter(c){
  activeFilter=c;
  filtered=c==='Alle'?[...nouns]:nouns.filter(x=>x.cat===c);
  shuffle(filtered);idx=0;answered=false;
  renderFilters();render();
}

// ========== MODES ==========
function setMode(m){
  mode=m;idx=0;answered=false;
  if(speedTimer){clearInterval(speedTimer);speedTimer=null;}speedActive=false;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{
    t.classList.toggle('active',['gender','sentences','speed'][i]===m);
  });
  shuffle(filtered);render();
}

// ========== RENDER ==========
function render(){
  updateStats();updateProgress();
  if(mode==='gender') renderGender();
  else if(mode==='sentences') renderSentences();
  else renderSpeed();
}

function renderGender(){
  if(idx>=filtered.length){showDone();return;}
  const n=filtered[idx];
  document.getElementById('mainArea').innerHTML=`
    <div class="quiz-card" id="quizCard">
      <div class="card-num">${idx+1} / ${filtered.length}</div>
      <div class="noun">${n.noun}</div>
      <div class="noun-en">${n.en}</div>
      <div class="plural">Plural: die ${n.plural}</div>
      <div class="sentence">${n.sent.replace('___','<b>___</b>')}</div>
      <div class="gender-btns">
        <button class="gender-btn btn-der" id="btn-der" onclick="pickGender('der')">der</button>
        <button class="gender-btn btn-die" id="btn-die" onclick="pickGender('die')">die</button>
        <button class="gender-btn btn-das" id="btn-das" onclick="pickGender('das')">das</button>
      </div>
      <div class="result-line" id="resultLine"></div>
      <div class="tip-box" id="tipBox">💡 ${n.tip}</div>
    </div>
    <div class="nav-row">
      <button class="nav-btn prev" onclick="go(-1)" ${idx===0?'disabled':''}>← Back</button>
      <button class="nav-btn next" onclick="go(1)" id="nextBtn" ${!answered?'disabled':''}>Next →</button>
    </div>
    <div class="kbd-hint"><kbd>1</kbd> der &nbsp; <kbd>2</kbd> die &nbsp; <kbd>3</kbd> das &nbsp; <kbd>→</kbd> Next</div>
  `;
}

function pickGender(choice){
  if(answered)return;
  answered=true;
  const n=filtered[idx];
  const correct=choice===n.article;
  const card=document.getElementById('quizCard');
  const res=document.getElementById('resultLine');
  const tip=document.getElementById('tipBox');
  ['der','die','das'].forEach(a=>{
    const btn=document.getElementById('btn-'+a);
    btn.disabled=true;
    if(a===n.article) btn.classList.add('correct');
    else if(a===choice&&!correct) btn.classList.add('wrong');
  });
  card.classList.add('flash-'+n.article);
  if(correct){
    res.textContent='✓ Richtig! — '+n.article+' '+n.noun;
    res.className='result-line r-correct';
    stats.c++;stats.streak++;
    if(stats.streak>stats.best)stats.best=stats.streak;
  } else {
    res.textContent='✗ '+n.article+' '+n.noun+' (not '+choice+')';
    res.className='result-line r-wrong';
    stats.w++;stats.streak=0;
  }
  tip.classList.add('show');
  document.getElementById('nextBtn').disabled=false;
  localStorage.setItem('artStatsB1',JSON.stringify(stats));
  updateStats();
}

function renderSentences(){
  if(idx>=filtered.length){showDone();return;}
  const n=filtered[idx];
  let sentHTML,answer,hint;
  if(n.sentBlank){
    sentHTML=n.sent.replace(n.sentBlank,`<input class="blank-input" id="sentInput" placeholder="..." autocomplete="off">`);
    answer=n.sentBlank;
    hint=`Fill in the missing word. (${n.article} ${n.noun} = ${n.en})`;
  } else {
    sentHTML=n.sent.replace('___',`<input class="blank-input" id="sentInput" placeholder="..." autocomplete="off">`);
    answer=n.article.charAt(0).toUpperCase()+n.article.slice(1);
    hint=`What article goes here? (${n.noun} = ${n.en})`;
  }
  document.getElementById('mainArea').innerHTML=`
    <div class="sent-card">
      <div class="sent-num">${idx+1} / ${filtered.length} &nbsp;·&nbsp; ${n.article} ${n.noun} (${n.en})</div>
      <div class="sent-text">${sentHTML}</div>
      <div class="sent-hint">💡 ${hint}</div>
      <div class="nav-row" style="justify-content:flex-start;margin-top:16px;">
        <button class="nav-btn next" onclick="checkSentence('${answer.replace(/'/g,"\\'")}')">Check ✓</button>
      </div>
      <div class="result-line" id="sentResult" style="margin-top:12px;"></div>
      <div class="sent-en" id="sentEn">🇬🇧 ${n.sentEn}</div>
      <div class="tip-box" id="tipBox">💡 ${n.tip}</div>
    </div>
    <div class="nav-row">
      <button class="nav-btn prev" onclick="go(-1)" ${idx===0?'disabled':''}>← Back</button>
      <button class="nav-btn next" onclick="go(1)" id="nextBtn" disabled>Next →</button>
    </div>
    <div class="kbd-hint"><kbd>Enter</kbd> Check &nbsp; <kbd>→</kbd> Next</div>
  `;
  document.getElementById('sentInput')?.focus();
}

function checkSentence(answer){
  if(answered)return;
  const input=document.getElementById('sentInput');
  if(!input)return;
  const val=input.value.trim();
  if(!val)return;
  answered=true;
  const correct=val.toLowerCase()===answer.toLowerCase();
  input.classList.add(correct?'correct':'incorrect');
  input.disabled=true;
  const res=document.getElementById('sentResult');
  if(correct){
    res.textContent='✓ Richtig!';res.className='result-line r-correct';
    stats.c++;stats.streak++;if(stats.streak>stats.best)stats.best=stats.streak;
  } else {
    res.textContent=`✗ Answer: ${answer}`;res.className='result-line r-wrong';
    stats.w++;stats.streak=0;
  }
  document.getElementById('sentEn').classList.add('show');
  document.getElementById('tipBox').classList.add('show');
  document.getElementById('nextBtn').disabled=false;
  localStorage.setItem('artStatsB1',JSON.stringify(stats));
  updateStats();
}

function renderSpeed(){
  if(!speedActive){
    document.getElementById('mainArea').innerHTML=`
      <div class="speed-area">
        <div style="margin:40px 0;">
          <p style="font-size:16px;color:var(--g600);margin-bottom:8px;">How fast can you go?</p>
          <p style="font-size:14px;color:var(--g400);">Pick <b>der</b>, <b>die</b>, or <b>das</b> for each noun.<br>30 seconds on the clock!</p>
        </div>
        <button class="speed-start" onclick="startSpeed()">Start ⚡</button>
      </div>
    `;
  }
}

function startSpeed(){
  speedActive=true;speedTime=30;speedScore=0;
  shuffle(filtered);idx=0;
  renderSpeedCard();
  speedTimer=setInterval(()=>{
    speedTime--;
    document.getElementById('speedClock').textContent=speedTime;
    if(speedTime<=0){clearInterval(speedTimer);speedTimer=null;endSpeed();}
  },1000);
}

function renderSpeedCard(){
  if(idx>=filtered.length){shuffle(filtered);idx=0;}
  const n=filtered[idx];
  document.getElementById('mainArea').innerHTML=`
    <div class="speed-area">
      <div class="speed-timer" id="speedClock">${speedTime}</div>
      <div class="speed-noun">${n.noun}</div>
      <div class="speed-score">Score: ${speedScore}</div>
      <div class="gender-btns">
        <button class="gender-btn btn-der" onclick="speedPick('der')">der</button>
        <button class="gender-btn btn-die" onclick="speedPick('die')">die</button>
        <button class="gender-btn btn-das" onclick="speedPick('das')">das</button>
      </div>
      <div style="font-size:13px;color:var(--g400);margin-top:8px;">${n.en}</div>
    </div>
  `;
}

function speedPick(choice){
  const n=filtered[idx];
  if(choice===n.article){speedScore++;stats.c++;stats.streak++;if(stats.streak>stats.best)stats.best=stats.streak;}
  else{stats.w++;stats.streak=0;}
  localStorage.setItem('artStatsB1',JSON.stringify(stats));
  idx++;renderSpeedCard();
}

function endSpeed(){
  speedActive=false;
  document.getElementById('mainArea').innerHTML=`
    <div class="done-card">
      <h2>⚡ Time's up!</h2>
      <p>You got <b>${speedScore}</b> correct in 30 seconds!</p>
      <p>${speedScore>=20?'Amazing! 🏆':speedScore>=15?'Great job! 🌟':speedScore>=10?'Good work! 👍':'Keep practicing! 💪'}</p>
      <button onclick="renderSpeed()">Play Again</button>
    </div>
  `;
  updateStats();
}

// ========== NAVIGATION ==========
function go(dir){
  idx+=dir;if(idx<0)idx=0;
  answered=false;render();
}

function showDone(){
  const pct=stats.c+stats.w>0?Math.round(stats.c/(stats.c+stats.w)*100):0;
  document.getElementById('mainArea').innerHTML=`
    <div class="done-card">
      <h2>🎉 Runde geschafft!</h2>
      <p>You completed all ${filtered.length} nouns!</p>
      <p>Accuracy: ${pct}% · Best streak: ${stats.best} 🔥</p>
      <button onclick="shuffle(filtered);idx=0;answered=false;render();">Shuffle & Restart 🔄</button>
    </div>
  `;
}

// ========== STATS & PROGRESS ==========
function updateStats(){
  document.getElementById('sCorrect').textContent=stats.c;
  document.getElementById('sWrong').textContent=stats.w;
  const total=stats.c+stats.w;
  document.getElementById('sAccuracy').textContent=total>0?Math.round(stats.c/total*100)+'%':'—';
  document.getElementById('sStreak').textContent=stats.streak+' 🔥';
}
function updateProgress(){
  const p=filtered.length>0?Math.round(idx/filtered.length*100):0;
  document.getElementById('pLabel').textContent=`Card ${Math.min(idx+1,filtered.length)} of ${filtered.length}`;
  document.getElementById('pPct').textContent=p+'%';
  document.getElementById('pBar').style.width=p+'%';
}

// ========== KEYBOARD ==========
document.addEventListener('keydown',e=>{
  if(mode==='gender'&&!answered){
    if(e.key==='1')pickGender('der');
    else if(e.key==='2')pickGender('die');
    else if(e.key==='3')pickGender('das');
  }
  if(mode==='speed'&&speedActive){
    if(e.key==='1')speedPick('der');
    else if(e.key==='2')speedPick('die');
    else if(e.key==='3')speedPick('das');
  }
  if(mode==='sentences'&&!answered&&e.key==='Enter'){
    document.querySelector('.nav-btn.next')?.click();
  }
  if(e.key==='ArrowRight'&&answered)go(1);
  if(e.key==='ArrowLeft')go(-1);
});

// ========== INIT ==========
shuffle(filtered);
renderFilters();
render();
</script>
</body>
</html>
